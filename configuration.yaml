# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes
  extra_module_url:
    - /local/community/custom-brand-icons/custom-brand-icons.js
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

shell_command:
  retrotink_4k_send: /bin/sh -c 'stty -F "{{ device }}" 115200 cs8 -cstopb -parenb && echo "{{ command }}" > "{{ device }}"'

rest_command:
  gamescare_scart_switch_set_port:
    url: "http://192.168.4.9/ports?force={{ port }}"
    method: GET

input_datetime:
  sleep_timer_end:
    name: Sleep Timer End Time
    has_date: true
    has_time: true

input_boolean:
  sleep_timer_active:
    name: Sleep Timer Active
    initial: false

template:
  - sensor:
      - name: "Sleep Timer Status"
        unique_id: sleep_timer_status
        state: >
          {% if is_state('input_boolean.sleep_timer_active', 'on') %}
            {% set end_val = states('input_datetime.sleep_timer_end') %}
            {% set end_time = end_val | as_datetime | as_local if end_val not in ['unknown', 'unavailable'] else none %}
            {% if end_time %}
              {% set remaining = (end_time - now()).total_seconds() %}
              {% if remaining > 0 %}
                {{ 'Active: ' ~ (remaining // 60) | int ~ ' min' }}
              {% else %}
                Expired
              {% endif %}
            {% else %}
              Active
            {% endif %}
          {% else %}
            Inactive
          {% endif %}
        icon: >
          {{ 'mdi:timer' if is_state('input_boolean.sleep_timer_active', 'on') else 'mdi:timer-off' }}

      - name: "Sleep Timer Remaining Minutes"
        unique_id: sleep_timer_remaining_minutes
        state: >
          {% if is_state('input_boolean.sleep_timer_active', 'on') %}
            {# This line forces a refresh when the clock minute changes #}
            {% set update = states('sensor.time') %}
            {% set end_val = states('input_datetime.sleep_timer_end') %}
            {% set end_time = end_val | as_datetime | as_local if end_val not in ['unknown', 'unavailable'] else none %}
            {% if end_time %}
              {% set remaining = (end_time - now()).total_seconds() %}
              {# Using / 60 instead of // 60 preserves decimal precision for the Stream Deck #}
              {{ (remaining / 60) | round(2) if remaining > 0 else 0 }}
            {% else %}
              0
            {% endif %}
          {% else %}
            0
          {% endif %}
        unit_of_measurement: "min"
        icon: mdi:timer

  - sensor:
      - name: "Bedroom Brightness Gauge"
        unique_id: bedroom_brightness_gauge
        state: "{{ state_attr('light.bedroom', 'brightness') | float(0) }}"
        unit_of_measurement: "pts"
      - name: "TV Brightness Gauge"
        unique_id: tv_brightness_gauge
        state: "{{ state_attr('light.tv', 'brightness') | float(0) }}"
        unit_of_measurement: "pts"
