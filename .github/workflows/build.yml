name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build aarch64 package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build with PyInstaller (aarch64)
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/build" \
            -w /build \
            python:3.11-slim \
            bash -c "
              apt-get update -qq && apt-get install -y -qq binutils &&
              pip install --upgrade pip &&
              pip install pyinstaller ucapi aiohttp &&
              pyinstaller \
                --onedir \
                --name driver \
                --distpath dist \
                --workpath build \
                --noconfirm \
                driver.py
            "

      - name: Package
        run: |
          TAG=${GITHUB_REF_NAME:-dev}
          PKGNAME="uc-intg-rt4k-${TAG}-aarch64"
          mkdir -p "package/bin"
          cp driver.json package/
          cp dist/driver/driver package/bin/
          cp -r dist/driver/_internal package/bin/_internal
          cd package
          tar czf "../${PKGNAME}.tar.gz" .
          echo "PKGNAME=${PKGNAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKGNAME }}
          path: "*.tar.gz"

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
          generate_release_notes: true
